version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php.Dockerfile
    container_name: siotic-app-prod
    restart: always
    working_dir: /var/www
    env_file: .env
    volumes:
      - ./backend:/var/www
      - ./docker/php.prod.ini:/usr/local/etc/php/conf.d/prod.ini
    networks:
      - siotic-tier-internal

  webserver:
    image: nginx:alpine
    container_name: siotic-webserver-prod
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www
      - ./frontend/dist:/var/www/frontend/dist
      - ./docker/nginx.prod.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - siotic-tier-public
      - siotic-tier-internal

  db:
    image: mariadb:latest
    container_name: siotic-db-prod
    restart: always
    environment:
      MYSQL_DATABASE: siotic
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - ./dbdata_prod:/var/lib/mysql
    command: --innodb-buffer-pool-size=1G --innodb-log-file-size=256M
    networks:
      - siotic-tier-internal

networks:
  siotic-tier-public:
    driver: bridge
  siotic-tier-internal:
    driver: bridge

volumes:
  dbdata_prod:
    driver: local
