version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/php.Dockerfile
    container_name: siotic-app
    restart: unless-stopped
    working_dir: /var/www
    env_file: .env
    volumes:
      - ./backend:/var/www
    networks:
      - siotic-network

  webserver:
    image: nginx:alpine
    container_name: siotic-webserver
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - siotic-network

  db:
    image: mariadb:latest
    container_name: siotic-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: siotic
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - ./dbdata:/var/lib/mysql
      - ./backend/sql:/docker-entrypoint-initdb.d
    command: --innodb-buffer-pool-size=1G --innodb-log-file-size=256M --innodb-flush-log-at-trx-commit=2
    networks:
      - siotic-network

networks:
  siotic-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
